<?xml version="1.0" encoding="UTF-8"?>
<svg width="960" height="520" viewBox="0 0 960 520" xmlns="http://www.w3.org/2000/svg"
  font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0000001a"/>
    </filter>
    <filter id="s2">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0000000f"/>
    </filter>
    <marker id="a-blue" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1,1 L11,6 L1,11 Z" fill="#3b82f6"/>
    </marker>
    <marker id="a-gray" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1,1 L11,6 L1,11 Z" fill="#94a3b8"/>
    </marker>
    <linearGradient id="sf-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="mule-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="erp-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="520" fill="#f8fafc"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="260" x2="960" y2="260" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,8"/>

  <!-- ════════════════════════════════════════════
       TITLE
  ════════════════════════════════════════════ -->
  <text x="480" y="38" text-anchor="middle" fill="#0f172a" font-size="20" font-weight="700" letter-spacing="-0.5">
    Salesforce ↔ ERPNext Customer Sync
  </text>
  <text x="480" y="60" text-anchor="middle" fill="#64748b" font-size="12.5">
    Real-time event-driven integration  ·  MuleSoft 4  ·  API-led Connectivity
  </text>

  <!-- ════════════════════════════════════════════
       MAIN FLOW ROW  (y-center ≈ 178)
  ════════════════════════════════════════════ -->

  <!-- ── Salesforce ── -->
  <rect x="36" y="88" width="190" height="180" rx="16" fill="url(#sf-grad)" filter="url(#s)"/>
  <!-- icon circle -->
  <circle cx="131" cy="134" r="28" fill="#ffffff22"/>
  <text x="131" y="140" text-anchor="middle" fill="#fff" font-size="26">☁</text>
  <text x="131" y="178" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">Salesforce</text>
  <text x="131" y="197" text-anchor="middle" fill="#bfdbfe" font-size="11">Account Object</text>
  <!-- bottom tag -->
  <rect x="56" y="234" width="150" height="22" rx="11" fill="#ffffff22"/>
  <text x="131" y="249" text-anchor="middle" fill="#e0e7ff" font-size="10" font-weight="600">CRM · Source of Truth</text>

  <!-- ── Arrow SF → Mule ── -->
  <line x1="228" y1="178" x2="284" y2="178" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#a-blue)"/>
  <!-- label above arrow -->
  <rect x="224" y="160" width="64" height="18" rx="9" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="256" y="173" text-anchor="middle" fill="#1d4ed8" font-size="9.5" font-weight="700">CDC Event</text>

  <!-- ── MuleSoft Hub ── -->
  <rect x="286" y="78" width="388" height="200" rx="16" fill="url(#mule-grad)" filter="url(#s)"/>
  <!-- top label -->
  <text x="480" y="106" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">MuleSoft Integration Hub</text>
  <text x="480" y="124" text-anchor="middle" fill="#c4b5fd" font-size="10.5">Anypoint Studio  ·  API-led Connectivity  ·  DataWeave 2.0</text>

  <!-- Three layer pills inside -->
  <rect x="306" y="134" width="348" height="36" rx="10" fill="#ffffff18"/>
  <text x="340" y="149" fill="#e9d5ff" font-size="9" font-weight="700" letter-spacing="0.5">EXPERIENCE</text>
  <text x="340" y="162" fill="#ddd6fe" font-size="9">CDC Listener · Idempotency · Event routing</text>

  <rect x="306" y="176" width="348" height="36" rx="10" fill="#ffffff18"/>
  <text x="340" y="191" fill="#e9d5ff" font-size="9" font-weight="700" letter-spacing="0.5">PROCESS</text>
  <text x="340" y="204" fill="#ddd6fe" font-size="9">Transform · Route CREATE / UPDATE / DELETE</text>

  <rect x="306" y="218" width="348" height="36" rx="10" fill="#ffffff18"/>
  <text x="340" y="233" fill="#e9d5ff" font-size="9" font-weight="700" letter-spacing="0.5">SYSTEM</text>
  <text x="340" y="246" fill="#ddd6fe" font-size="9">Upsert · Soft-disable · ERPNext REST calls</text>

  <!-- ── Arrow Mule → ERP ── -->
  <line x1="676" y1="178" x2="732" y2="178" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#a-blue)"/>
  <rect x="672" y="160" width="64" height="18" rx="9" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="704" y="173" text-anchor="middle" fill="#15803d" font-size="9.5" font-weight="700">REST / JSON</text>

  <!-- ── ERPNext ── -->
  <rect x="734" y="88" width="190" height="180" rx="16" fill="url(#erp-grad)" filter="url(#s)"/>
  <circle cx="829" cy="134" r="28" fill="#ffffff22"/>
  <text x="829" y="140" text-anchor="middle" fill="#fff" font-size="26">⚙</text>
  <text x="829" y="178" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">ERPNext</text>
  <text x="829" y="197" text-anchor="middle" fill="#a7f3d0" font-size="11">Customer DocType</text>
  <rect x="754" y="234" width="150" height="22" rx="11" fill="#ffffff22"/>
  <text x="829" y="249" text-anchor="middle" fill="#d1fae5" font-size="10" font-weight="600">ERP · Target System</text>

  <!-- ════════════════════════════════════════════
       DIVIDER
  ════════════════════════════════════════════ -->
  <line x1="60" y1="298" x2="900" y2="298" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="480" y="316" text-anchor="middle" fill="#475569" font-size="11" font-weight="700" letter-spacing="1.5">RESILIENCE  PATTERNS</text>

  <!-- ════════════════════════════════════════════
       FOUR PATTERN CARDS
  ════════════════════════════════════════════ -->

  <!-- Card 1: Idempotency -->
  <rect x="36" y="328" width="202" height="158" rx="14" fill="#f8f7ff" stroke="#a5b4fc" stroke-width="2" filter="url(#s2)"/>
  <rect x="36" y="328" width="202" height="50" rx="14" fill="#4f46e5"/>
  <rect x="36" y="358" width="202" height="20" fill="#4f46e5"/>
  <text x="62" y="350" fill="#fff" font-size="13.5" font-weight="700">Idempotency</text>
  <text x="62" y="368" fill="#c7d2fe" font-size="10">ObjectStore · 7-day TTL</text>
  <circle cx="212" cy="347" r="14" fill="#ffffff25"/>
  <text x="212" y="353" text-anchor="middle" fill="#fff" font-size="15">🔑</text>
  <!-- body -->
  <text x="52" y="398" fill="#1e1b4b" font-size="11" font-weight="600">Each event keyed by</text>
  <text x="52" y="414" fill="#312e81" font-size="10.5">replayId + recordId + type</text>
  <text x="52" y="435" fill="#1e1b4b" font-size="11" font-weight="600">Replayed events skipped</text>
  <text x="52" y="451" fill="#312e81" font-size="10.5">No double writes to ERPNext</text>

  <!-- Card 2: Dead Letter Queue -->
  <rect x="254" y="328" width="202" height="158" rx="14" fill="#fff7f7" stroke="#fca5a5" stroke-width="2" filter="url(#s2)"/>
  <rect x="254" y="328" width="202" height="50" rx="14" fill="#dc2626"/>
  <rect x="254" y="358" width="202" height="20" fill="#dc2626"/>
  <text x="280" y="350" fill="#fff" font-size="13.5" font-weight="700">Dead Letter Queue</text>
  <text x="280" y="368" fill="#fecaca" font-size="10">Persistent · No TTL · replayable</text>
  <circle cx="430" cy="347" r="14" fill="#ffffff25"/>
  <text x="430" y="353" text-anchor="middle" fill="#fff" font-size="15">📥</text>
  <text x="270" y="398" fill="#450a0a" font-size="11" font-weight="600">Failed events stored with</text>
  <text x="270" y="414" fill="#7f1d1d" font-size="10.5">full context snapshot</text>
  <text x="270" y="435" fill="#450a0a" font-size="11" font-weight="600">Admin API to inspect &amp; replay</text>
  <text x="270" y="451" fill="#7f1d1d" font-size="10.5">Zero data loss</text>

  <!-- Card 3: Pending Disable -->
  <rect x="472" y="328" width="202" height="158" rx="14" fill="#fffbf0" stroke="#fbbf24" stroke-width="2" filter="url(#s2)"/>
  <rect x="472" y="328" width="202" height="50" rx="14" fill="#d97706"/>
  <rect x="472" y="358" width="202" height="20" fill="#d97706"/>
  <text x="498" y="350" fill="#fff" font-size="13.5" font-weight="700">Pending Disable</text>
  <text x="498" y="368" fill="#fef3c7" font-size="10">Cross-flow race coordination</text>
  <circle cx="648" cy="347" r="14" fill="#ffffff25"/>
  <text x="648" y="353" text-anchor="middle" fill="#fff" font-size="15">⚡</text>
  <text x="488" y="398" fill="#451a03" font-size="11" font-weight="600">DELETE arrives before</text>
  <text x="488" y="414" fill="#78350f" font-size="10.5">CREATE completes</text>
  <text x="488" y="435" fill="#451a03" font-size="11" font-weight="600">Marker queued; CREATE reads</text>
  <text x="488" y="451" fill="#78350f" font-size="10.5">it and disables immediately</text>

  <!-- Card 4: Reconciliation -->
  <rect x="690" y="328" width="234" height="158" rx="14" fill="#f0fbff" stroke="#67e8f9" stroke-width="2" filter="url(#s2)"/>
  <rect x="690" y="328" width="234" height="50" rx="14" fill="#0891b2"/>
  <rect x="690" y="358" width="234" height="20" fill="#0891b2"/>
  <text x="716" y="350" fill="#fff" font-size="13.5" font-weight="700">Nightly Reconciliation</text>
  <text x="716" y="368" fill="#cffafe" font-size="10">Cron 02:00 UTC · on-demand</text>
  <circle cx="898" cy="347" r="14" fill="#ffffff25"/>
  <text x="898" y="353" text-anchor="middle" fill="#fff" font-size="15">🔄</text>
  <text x="706" y="398" fill="#083344" font-size="11" font-weight="600">Diffs Salesforce ↔ ERPNext</text>
  <text x="706" y="414" fill="#164e63" font-size="10.5">Creates missing · fixes stale</text>
  <text x="706" y="435" fill="#083344" font-size="11" font-weight="600">Disables orphaned records</text>
  <text x="706" y="451" fill="#164e63" font-size="10.5">Backstop beyond 72-hr window</text>

  <!-- ════════════════════════════════════════════
       FOOTER
  ════════════════════════════════════════════ -->
  <text x="480" y="504" text-anchor="middle" fill="#64748b" font-size="10">
    MuleSoft 4  ·  Anypoint Studio  ·  Salesforce CDC  ·  ERPNext / Frappe  ·  DataWeave 2.0  ·  ObjectStore
  </text>
</svg>
